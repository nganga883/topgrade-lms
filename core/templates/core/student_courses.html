<h2>My Courses</h2>

{% for course in courses %}
  <h3>{{ course.name }} ({{ course.code }})</h3>

  <ul>
    {% for material in materials %}
      {% if material.course.id == course.id %}
        <li>
          {{ material.title }}
          <a href="{{ material.file.url }}" download>Download</a>
        </li>
      {% endif %}
    {% endfor %}
  </ul>
{% endfor %}
