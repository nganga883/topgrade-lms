<h2>Manage Users</h2>
<p>{{ message }}</p>
<table border="1">
<tr>
<th>Username</th>
<th>Email</th>
<th>Role</th>
<th>Status</th>
<th>Actions</th>
</tr>
{% for user in users %}
<tr>
<td>{{ user.username }}</td>
<td>{{ user.email }}</td>
<td>{{ user.role }}</td>
<td>{% if user.is_suspended %}Suspended{% else %}Active{% endif %}</td>
<td>
<form method="POST" style="display:inline;">
    {% csrf_token %}
    <input type="hidden" name="user_id" value="{{ user.id }}">
    <input type="hidden" name="action" value="toggle">
    <button type="submit">{% if user.is_suspended %}Activate{% else %}Suspend{% endif %}</button>
</form>

<form method="POST" style="display:inline;">
    {% csrf_token %}
    <input type="hidden" name="user_id" value="{{ user.id }}">
    <input type="hidden" name="action" value="reset_password">
    <input type="password" name="new_password" placeholder="New password" required>
    <button type="submit">Reset</button>
</form>
</td>
</tr>
{% endfor %}
</table>
