<h2>Manage Courses</h2>
<p>{{ message }}</p>
<form method="POST">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Course Name" required>
    <input type="text" name="code" placeholder="Course Code" required>
    <select name="lecturer" required>
        {% for lecturer in lecturers %}
        <option value="{{ lecturer.id }}">{{ lecturer.username }}</option>
        {% endfor %}
    </select>
    <button type="submit">Add Course</button>
</form>

<h3>Existing Courses</h3>
<table border="1">
<tr><th>Code</th><th>Name</th><th>Lecturer</th></tr>
{% for course in courses %}
<tr>
<td>{{ course.code }}</td>
<td>{{ course.name }}</td>
<td>{{ course.lecturer.username }}</td>
</tr>
{% endfor %}
</table>
