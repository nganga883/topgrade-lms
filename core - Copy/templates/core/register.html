{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - TOPGRADE LMS</title>
    <link rel="stylesheet" href="{% static 'core/css/register.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="logo">TOPGRADE LMS</div>
    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/register/">Register</a></li>
        <li><a href="/login/">Login</a></li>
    </ul>
</nav>

<section class="form-section">
    <h2>Student Registration</h2>
    {% if message %}
        <p class="message">{{ message }}</p>
    {% endif %}
    <form method="POST" id="registerForm">
        {% csrf_token %}
        <label for="username">Username:</label>
        <input type="text" name="username" id="username" required>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" required>

        <label for="confirm_email">Confirm Email:</label>
        <input type="email" name="confirm_email" id="confirm_email" required>

        <label for="password1">Password:</label>
        <input type="password" name="password1" id="password1" required>

        <label for="password2">Confirm Password:</label>
        <input type="password" name="password2" id="password2" required>

        <button type="submit">Register</button>
    </form>
</section>

<script src="{% static 'core/js/register.js' %}"></script>
</body>
</html>
